services:
  - type: web
    name: disease-prediction-system
    runtime: python
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn run:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: disease-db
          property: connectionString

databases:
  - name: disease-db
    databaseName: disease_db
    user: disease_user
    plan: free